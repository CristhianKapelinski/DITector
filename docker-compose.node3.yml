version: '3.8'

# Stage II — Builder node. Runs on any machine with network access to the
# primary's MongoDB and Neo4j. Two or more builder nodes can run simultaneously:
# ClaimNextBuildRepo() is atomic, so each repo is processed by exactly one node.
#
# Required .env variables on this machine:
#   DB_HOST=<primary machine IP>
#   ACCOUNTS=accounts_builder.json   (or accounts.json)
#   THRESHOLD=1000000                (minimum pull_count to process)
#   TAGS=10                          (tags to fetch per repo)
#
# Usage:
#   make start-build

services:
  builder:
    image: golang:1.22
    container_name: ditector_builder
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - MONGO_URI=${MONGO_URI}
      - NEO4J_URI=${NEO4J_URI}
    command: >
      sh -c "go build -buildvcs=false -o /tmp/ditector . &&
             /tmp/ditector build
               --accounts ${ACCOUNTS:-accounts.json}
               --threshold ${THRESHOLD:-1000000}
               --tags ${TAGS:-10}
               --config config.yaml
               --data_dir /app"
