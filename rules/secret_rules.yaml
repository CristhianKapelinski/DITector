# private keys
- name: 'PEM Private Key'
  regex: '-----BEGIN (?:(?:RSA|DSA|EC|OPENSSH) )?PRIVATE KEY-----[\r\n]+(?:\w+:.+)*[\s]*(?:[0-9a-zA-Z+\/=]{64,76}[\r\n]+)+[0-9a-zA-Z+\/=]+[\r\n]+-----END (?:(?:RSA|DSA|EC|OPENSSH) )?PRIVATE KEY-----'
  severity: 'HIGH'
  severity_score: 7
- name: 'PGP Private Key Block'
  regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----[\r\n]+(?:\w+:.+)*[\s]*(?:[0-9a-zA-Z+\/=]{64,76}[\r\n]+)+[0-9a-zA-Z+\/=]+[\r\n]+=[0-9a-zA-Z+\/=]{4}[\r\n]+-----END PGP PRIVATE KEY BLOCK-----'
  severity: 'HIGH'
  severity_score: 7

# public keys

# API tokens(from trufflehog/ASIACCS 2023)
- name: 'Alibaba Cloud Access Key ID'
  regex: '\b(LTAI[a-zA-Z0-9]{17,21})[\"’;\s]*'
  severity: 'LOW'
  severity_score: 3
- name: 'AWS Access Key ID'
  regex: '\b(?:A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b'
  severity: 'LOW'
  severity_score: 3
- name: 'Azure Client Secret'
  regex: '(?i)(client_secret|clientsecret).{0,20}([a-z0-9_\.\-~]{34})'
  severity: 'LOW'
  severity_score: 3
- name: 'DigitalOcean V1'
  regex: '(?i)(?:ocean|do)(?:.|[\n\r]){0,40}\b([A-Za-z0-9_-]{64})\b'
  severity: 'LOW'
  severity_score: 3
- name: 'DigitalOcean V2'
  regex: '\b((?:dop|doo|dor)_v1_[a-f0-9]{64})\b'
  severity: 'LOW'
  severity_score: 3
- name: 'Github Oauth Token'
  regex: '\b((?:ghp|gho|ghu|ghs|ghr|github_pat)_[a-zA-Z0-9_]{36,255})\b'
  severity: 'LOW'
  severity_score: 3
- name: 'GitLab V1'
  regex: '(?i)(?:gitlab)(?:.|[\n\r]){0,40}\b([a-zA-Z0-9\-=_]{20,22})\b'

- name: 'Facebook access token'
  regex: 'EAACEdEose0cBA[0-9A-Za-z]+'

- part: 'contents'
  name: 'Stripe API key'
  regex: '(?:r|s)k_(live|test)_[0-9a-zA-Z]{24}'
- part: 'contents'
  name: 'Google OAuth ID'
  regex: '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'

- part: 'contents'
  name: 'Google Services API Key'
  regex: 'AIza[0-9A-Za-z\\-_]{35}'
- part: 'contents'
  name: 'Google OAuth Access Token'
  regex: 'ya29\\.[0-9A-Za-z\\-_]+'
- part: 'contents'
  name: 'Picatic API key'
  regex: 'sk_(live|test)_[0-9a-z]{32}'
- part: 'contents'
  name: 'Square Access Token'
  regex: 'sq0atp-[0-9A-Za-z\-_]{22}'
- part: 'contents'
  name: 'Square OAuth Secret'
  regex: 'sq0csp-[0-9A-Za-z\-_]{43}'
- part: 'contents'
  name: 'PayPal/Braintree Access Token'
  regex: 'access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}'
- part: 'contents'
  name: 'Amazon MWS Auth Token'
  regex: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
- part: 'contents'
  name: 'Twilio API Key'
  regex: 'SK[0-9a-fA-F]{32}'
- part: 'contents'
  name: 'SendGrid API Key'
  regex: 'SG\.[0-9A-Za-z\-_]{22}\.[0-9A-Za-z\-_]{43}'
- part: 'contents'
  name: 'MailGun API Key'
  regex: 'key-[0-9a-zA-Z]{32}'
- part: 'contents'
  name: 'MailChimp API Key'
  regex: '[0-9a-f]{32}-us[0-9]{1,2}'

- part: 'contents'
  name: 'Outlook team'
  regex: '(https\://outlook\\.office.com/webhook/[0-9a-f-]{36}\\@)'
- part: 'contents'
  name: 'Sauce Token'
  regex: "(?i)sauce.{0,50}(\\\"|'|`)?[0-9a-f-]{36}(\\\"|'|`)?"
- part: 'contents'
  name: 'Slack Token'
  regex: '(xox[pboa]-[0-9]{12}-[0-9]{12}-[0-9]{12}-[a-z0-9]{32})'
- part: 'contents'
  name: 'Slack Webhook'
  regex: 'https://hooks.slack.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}'
- part: 'contents'
  name: 'SonarQube Docs API Key'
  regex: "(?i)sonar.{0,50}(\\\"|'|`)?[0-9a-f]{40}(\\\"|'|`)?"
- part: 'contents'
  name: 'HockeyApp'
  regex: "(?i)hockey.{0,50}(\\\"|'|`)?[0-9a-f]{32}(\\\"|'|`)?"

- part: 'contents'
  name: 'NuGet API Key'
  regex: 'oy2[a-z0-9]{43}'
- part: 'contents'
  name: 'OpenWeather API Key'
  regex: "(?i)appid=(\\\"|'|`)?[0-9a-f]{32}(\\\"|'|`)?"

- part: 'contents'
  name: 'Contains Private Key'
  regex: '-----BEGIN (?:EC|RSA|DSA|OPENSSH|PGP) PRIVATE KEY'

- part: 'contents'
  name: 'AWS cred file info'
  regex: '(?i)(aws_access_key_id|aws_secret_access_key)(.{0,20})?=.[0-9a-zA-Z\/+]{20,40}'
- part: 'contents'
  name: 'Facebook Secret Key'
  regex: '(?i)(facebook|fb)(.{0,20})?(?-i)[''\"][0-9a-f]{32}[''\"]'
- part: 'contents'
  name: 'Facebook Client ID'
  regex: '(?i)(facebook|fb)(.{0,20})?[''\"][0-9]{13,17}[''\"]'
- part: 'contents'
  name: 'Twitter Secret Key'
  regex: '(?i)twitter(.{0,20})?[''\"][0-9a-z]{35,44}[''\"]'
- part: 'contents'
  name: 'Twitter Client ID'
  regex: '(?i)twitter(.{0,20})?[''\"][0-9a-z]{18,25}[''\"]'
- part: 'contents'
  name: 'Twitter Access Token'
  regex: '[1-9][0-9]+-[0-9a-zA-Z]{40}'
- part: 'contents'
  name: 'Github Key'
  regex: '(?i)github(.{0,20})?(?-i)[''\"][0-9a-zA-Z]{35,40}[''\"]'
- part: 'contents'
  name: 'Heroku API key'
  regex: '(?i)heroku(.{0,20})?[''"][0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}[''"]'
- part: 'contents'
  name: 'Linkedin Client ID'
  regex: '(?i)linkedin(.{0,20})?(?-i)[''\"][0-9a-z]{12}[''\"]'
- part: 'contents'
  name: 'LinkedIn Secret Key'
  regex: '(?i)linkedin(.{0,20})?[''\"][0-9a-z]{16}[''\"]'
