# docker-compose.node2.yml — crawler shard 1 for the second crawl node
#
# SETUP ON node2:
#   1. git clone + git pull
#   2. Copy accounts_node2.json and config.yaml from node1
#   3. DB_HOST=<node1-ip> sudo -E docker-compose -f docker-compose.node2.yml up -d

version: '3.8'

services:
  crawler_node2:
    image: golang:1.22
    container_name: ditector_crawler_node2
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - MONGO_URI=mongodb://${DB_HOST:?DB_HOST must be set}:27017
      - NEO4J_URI=neo4j://${DB_HOST}:7687
      - PAGE_CONCURRENCY=${PAGE_CONCURRENCY:-8}
    command: sh -c "go build -buildvcs=false -o /tmp/ditector . && /tmp/ditector crawl --workers ${WORKERS:-50} --shard 1 --shards 2 --accounts accounts_a9.json --config config.yaml"
