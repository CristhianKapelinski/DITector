secrets:
  - part: 'contents'
    name: 'AWS Access Key ID Value'
    regex: '(?:A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'
  - part: 'contents'
    name: 'Alibaba Cloud Access Key ID'
    regex: '(LTAI[a-zA-Z0-9]{17,21})[\"’;\s]*'
