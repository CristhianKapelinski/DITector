  - part: 'contents'
    name: 'Facebook access token'
    regex: 'EAACEdEose0cBA[0-9A-Za-z]+'
#  - part: 'contents'
#    name: 'Google (GCM) Service account'
#    regex: "((\\\"|'|`)?type(\\\"|'|`)?\\\\s{0,50}(:|=>|=)\\\\s{0,50}(\\\"|'|`)?service_account(\\\"|'|`)?,?)"
#    regextype: 'large'
  - part: 'contents'
    name: 'Stripe API key'
    regex: '(?:r|s)k_(live|test)_[0-9a-zA-Z]{24}'
  - part: 'contents'
    name: 'Google OAuth ID'
    regex: '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'
#  - part: 'contents'
#    name: 'Google Cloud API Key'
#    regex: ''
  - part: 'contents'
    name: 'Google Services API Key'
    regex: 'AIza[0-9A-Za-z\\-_]{35}'
  - part: 'contents'
    name: 'Google OAuth Access Token'
    regex: 'ya29\\.[0-9A-Za-z\\-_]+'
  - part: 'contents'
    name: 'Picatic API key'
    regex: 'sk_(live|test)_[0-9a-z]{32}'
  - part: 'contents'
    name: 'Square Access Token'
    regex: 'sq0atp-[0-9A-Za-z\-_]{22}'
  - part: 'contents'
    name: 'Square OAuth Secret'
    regex: 'sq0csp-[0-9A-Za-z\-_]{43}'
  - part: 'contents'
    name: 'PayPal/Braintree Access Token'
    regex: 'access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}'
  - part: 'contents'
    name: 'Amazon MWS Auth Token'
    regex: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
  - part: 'contents'
    name: 'Twilio API Key'
    regex: 'SK[0-9a-fA-F]{32}'
  - part: 'contents'
    name: 'SendGrid API Key'
    regex: 'SG\.[0-9A-Za-z\-_]{22}\.[0-9A-Za-z\-_]{43}'
  - part: 'contents'
    name: 'MailGun API Key'
    regex: 'key-[0-9a-zA-Z]{32}'
  - part: 'contents'
    name: 'MailChimp API Key'
    regex: '[0-9a-f]{32}-us[0-9]{1,2}'
#  - part: 'contents'
#    name: 'SSH Password'
#    regex: "sshpass -p.*['|\\\"]"
#    regextype: 'large'
  - part: 'contents'
    name: 'Outlook team'
    regex: '(https\://outlook\\.office.com/webhook/[0-9a-f-]{36}\\@)'
  - part: 'contents'
    name: 'Sauce Token'
    regex: "(?i)sauce.{0,50}(\\\"|'|`)?[0-9a-f-]{36}(\\\"|'|`)?"
  - part: 'contents'
    name: 'Slack Token'
    regex: '(xox[pboa]-[0-9]{12}-[0-9]{12}-[0-9]{12}-[a-z0-9]{32})'
  - part: 'contents'
    name: 'Slack Webhook'
    regex: 'https://hooks.slack.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}'
  - part: 'contents'
    name: 'SonarQube Docs API Key'
    regex: "(?i)sonar.{0,50}(\\\"|'|`)?[0-9a-f]{40}(\\\"|'|`)?"
  - part: 'contents'
    name: 'HockeyApp'
    regex: "(?i)hockey.{0,50}(\\\"|'|`)?[0-9a-f]{32}(\\\"|'|`)?"
#  - part: 'contents'
#    name: 'Username and password in URI'
#    regex: '([\w+]{1,24})(://)([^$<]{1})([^\s";]{1,}):([^$<]{1})([^\s";/]{1,})@[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,24}([^\s]+)'
#    regextype: 'large'
