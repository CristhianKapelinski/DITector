version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ditector_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:latest
    container_name: ditector_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data

  crawler:
    image: golang:1.22
    container_name: ditector_crawler
    restart: unless-stopped
    depends_on:
      - mongodb
      - neo4j
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - PAGE_CONCURRENCY=${PAGE_CONCURRENCY:-8}
    # Meet-in-the-middle: shard 0/2 covers keywords starting with a–s (19 root chars).
    # Machine node2 runs docker-compose.node2.yml with --shard 1 --shards 2 (t–_).
    command: sh -c "go build -buildvcs=false -o /tmp/ditector . && /tmp/ditector crawl --workers ${WORKERS:-50} --shard 0 --shards 2 --accounts accounts_node1.json --config config.yaml"

volumes:
  mongo_data:
  neo4j_data:
